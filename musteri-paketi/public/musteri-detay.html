<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Cari Kartı - KARAARSLAN KÖMÜR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fas fa-industry me-2 text-warning"></i>KARAARSLAN KÖMÜR
        </a>
        <div class="ms-auto">
            <a href="musteriler.html" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left me-1"></i> Müşteri Listesine Dön</a>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card card-custom shadow h-100 border-top border-4 border-info">
                <div class="card-body">
                    <h4 class="card-title fw-bold text-dark-custom mb-3" id="detayAdSoyad">Yükleniyor...</h4>
                    <p class="mb-2"><i class="fas fa-phone-alt text-muted me-2"></i> <span id="detayTelefon">...</span></p>
                    <p class="mb-3"><i class="fas fa-map-marker-alt text-muted me-2"></i> <span id="detayAdres">...</span></p>
                    
                    <div class="d-grid gap-2 d-md-flex mt-4">
                        <button class="btn btn-success btn-sm flex-fill" id="btnWhatsapp"><i class="fab fa-whatsapp me-1"></i> WhatsApp</button>
                        <button class="btn btn-secondary btn-sm flex-fill" id="btnSms"><i class="fas fa-sms me-1"></i> SMS Gönder</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="row g-3 h-100">
                <div class="col-sm-4">
                    <div class="card card-custom bg-light h-100 border-0 shadow-sm">
                        <div class="card-body text-center d-flex flex-column justify-content-center">
                            <h6 class="text-muted">Toplam Alışveriş</h6>
                            <h3 class="text-danger fw-bold mb-0" id="detayToplamBorc">0 ₺</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="card card-custom bg-light h-100 border-0 shadow-sm">
                        <div class="card-body text-center d-flex flex-column justify-content-center">
                            <h6 class="text-muted">Yapılan Ödeme</h6>
                            <h3 class="text-success fw-bold mb-0" id="detayToplamOdenen">0 ₺</h3>
                        </div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="card card-custom h-100 border-0 shadow-sm" style="background-color: #e3f2fd;">
                        <div class="card-body text-center d-flex flex-column justify-content-center">
                            <h6 class="text-primary fw-bold">KALAN Bakiye</h6>
                            <h2 class="text-primary fw-bold mb-0" id="detayKalanBakiye">0 ₺</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-custom shadow-sm mb-4">
        <div class="card-body d-flex justify-content-between align-items-center bg-white rounded">
            <h5 class="mb-0 text-dark-custom"><i class="fas fa-bolt text-warning me-2"></i>Hızlı İşlemler</h5>
            <div>
                <button class="btn btn-orange me-2" onclick="hizliSatisYap()"><i class="fas fa-shopping-cart me-1"></i> Bu Müşteriye Satış Yap</button>
                <button class="btn btn-success" onclick="hizliOdemeAl()"><i class="fas fa-lira-sign me-1"></i> Tahsilat (Ödeme) Al</button>
            </div>
        </div>
    </div>

    <div class="card card-custom shadow">
        <div class="card-header bg-dark-custom text-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-list-alt me-2"></i>Hesap Hareketleri (Ekstre)</h5>
            <button class="btn btn-light btn-sm" onclick="window.print()"><i class="fas fa-print"></i> Dökümü Yazdır</button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tarih</th>
                            <th>İşlem Tipi</th>
                            <th>Açıklama</th>
                            <th class="text-end text-danger">Borç (₺)</th>
                            <th class="text-end text-success">Alacak (₺)</th>
                            <th class="text-end text-primary">Bakiye (₺)</th>
                        </tr>
                    </thead>
                    <tbody id="detayTabloGovdesi">
                        <tr><td colspan="6" class="text-center py-4">Veriler yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="musteri-detay.js"></script>
</body>
</html>
